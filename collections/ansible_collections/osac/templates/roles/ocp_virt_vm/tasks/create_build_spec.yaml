---
- name: Build template spec base
  ansible.builtin.set_fact:
    vm_template_spec:
      domain:
        cpu:
          cores: "{{ vm_cpu_cores }}"
        memory:
          guest: "{{ vm_memory }}"
        devices:
          disks:
            - name: root-disk
              disk:
                bus: virtio
          rng: {}
        features:
          smm:
            enabled: true
          acpi: {}
          apic: {}
          hyperv:
            relaxed: {}
            vapic: {}
            spinlocks:
              spinlocks: 8191
      volumes:
        - name: root-disk
          dataVolume:
            name: "{{ compute_instance_name }}-root-disk"

- name: Add GPU passthrough devices to template spec
  ansible.builtin.set_fact:
    vm_template_spec: "{{ vm_template_spec | combine(gpu_patch, recursive=True, list_merge='append') }}"
  vars:
    gpu_patch:
      domain:
        devices:
          hostDevices:
            - name: "gpu-{{ idx }}"
              deviceName: "{{ item.resource_name }}"
  loop: "{{ gpu_devices | default([]) }}"
  loop_control:
    index_var: idx
  when: gpu_devices | default([]) | length > 0
